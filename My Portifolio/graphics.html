<!DOCTYPE html>
<html>
<head>
    <title>2D Canvas Drawing</title>
</head>
<body>

<canvas id="myCanvas" width="800" height="500" style="border:1px solid black;"></canvas>

<script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");

    // 🌤️ Sky background
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, 800, 500);

    // 🌞 Sun
    ctx.beginPath();
    ctx.arc(700, 80, 50, 0, 2 * Math.PI);
    ctx.fillStyle = "yellow";
    ctx.fill();

    // 🏠 House base
    ctx.fillStyle = "#8B4513";
    ctx.fillRect(150, 250, 200, 150);

    // 🏠 Roof
    ctx.beginPath();
    ctx.moveTo(150, 250);
    ctx.lineTo(250, 150);
    ctx.lineTo(350, 250);
    ctx.closePath();
    ctx.fillStyle = "red";
    ctx.fill();

    // 🚪 Door
    ctx.fillStyle = "black";
    ctx.fillRect(230, 320, 40, 80);

    // 🌳 Tree trunk
    ctx.fillStyle = "#654321";
    ctx.fillRect(500, 300, 30, 100);

    // 🌳 Tree leaves
    ctx.beginPath();
    ctx.arc(515, 260, 50, 0, 2 * Math.PI);
    ctx.fillStyle = "green";
    ctx.fill();

    // 🛣️ Road
    ctx.fillStyle = "gray";
    ctx.fillRect(0, 400, 800, 100);

    // 🚗 Car body
    ctx.fillStyle = "blue";
    ctx.fillRect(400, 350, 120, 50);

    // 🚗 Car top
    ctx.fillRect(430, 320, 60, 40);

    // 🚗 Wheels
    ctx.beginPath();
    ctx.arc(430, 410, 15, 0, 2 * Math.PI);
    ctx.arc(500, 410, 15, 0, 2 * Math.PI);
    ctx.fillStyle = "black";
    ctx.fill();

</script>

</body>
</html>
